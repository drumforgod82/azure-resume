name: deploy_backend

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "backend/api/**"
      - "backend/tests/**"
      - ".github/workflows/backend.main.yml"

env:
  AZURE_FUNCTIONAPP_NAME: GetResumeCounterJamesDean
  DOTNET_VERSION: "8.0.x"

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Login via Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend dependencies
        run: dotnet restore backend/tests/tests.csproj

      - name: Run unit tests
        run: dotnet test backend/tests/tests.csproj --configuration Release --no-restore

      - name: Publish Azure Function
        run: dotnet publish backend/api/api.csproj --configuration Release --output backend/api/publish

      - name: Run Azure Functions Action
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: backend/api/publish

      - name: Azure Logout
        run: az logout
        if: always()
